#cloud-config
users:
  - name: ansible
    shell: /bin/bash
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    lock_passwd: true
    ssh-authorized-keys:
      - ${local_ssh_public_key}
  - name: groot
    shell: /bin/bash
    sudo: ["ALL=(ALL) NOPASSWD:ALL"]
    lock_passwd: true
    ssh-authorized-keys:
      - ${local_ssh_public_key}

package_update: true
package_upgrade: true

hostname: knowhere

packages:
  - ansible
  - git
  - curl
  - gpg
  - apt-transport-https

write_files:
  - path: /etc/network/interfaces.d/60-private-network.cfg
    content: |
      auto enp7s0
      iface enp7s0 inet dhcp
  - path: /etc/apt/sources.list.d/helm-stable-debian.list
    content: |
      deb [signed-by=/usr/share/keyrings/helm.gpg] https://packages.buildkite.com/helm-linux/helm-debian/any/ any main

runcmd:
  - curl -fsSL https://packages.buildkite.com/helm-linux/helm-debian/gpgkey | gpg --dearmor | tee /usr/share/keyrings/helm.gpg > /dev/null
  - apt-get update
  - apt-get install -y helm
  - systemctl restart networking
  - git clone https://github.com/iamkhattar/k8s-abstractions.git /opt/homelab
  - chown -R ansible:ansible /opt/homelab
  - su - ansible -s /bin/bash -c "cd /opt/homelab/ansible && ansible-playbook playbooks/site.yml -i inventory/inventory-agent.yml -e 'token=${k3s_api_token}'"
