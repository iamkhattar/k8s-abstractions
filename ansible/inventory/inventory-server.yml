k3s_cluster:
  children:
    server:
      hosts:
        localhost:
          ansible_connection: local
  vars:
    k3s_version: v1.35.2+k3s1
    ansible_user: ansible
    api_endpoint: "10.0.1.1"
    extra_server_args: "--secrets-encryption --node-ip={{ private_ip }} --flannel-iface={{ private_iface }} --tls-san={{ public_ip }}"
